<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planity Buchung</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: transparent;
    }
    #planity-container {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="planity-container"></div>
  <script>
    var urlParams = new URLSearchParams(window.location.search);
    var apiKey = urlParams.get('key') || '-O6_yVEoetmNMQ3ly9xo';
    var container = document.getElementById('planity-container');
    window.planity = {
      key: apiKey,
      primaryColor: '#416373',
      options: {
        countryCode: 'DE'
      },
      container: container,
      accountContainer: container,
      appointmentContainer: container,
      giftVoucherContainer: container,
      onlineShopContainer: container
    };
  </script>
  <script src="https://d2skjte8udjqxw.cloudfront.net/widget/production/2/polyfills.latest.js"></script>
  <script src="https://d2skjte8udjqxw.cloudfront.net/widget/production/2/app.latest.js"></script>
</body>
</html>
